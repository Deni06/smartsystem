version: '3.8'

services:
  # Service Web (PHP dengan Apache)
  web:
    build: .
    container_name: smartdoor-web
    ports:
      - "80:80"
      - "443:443"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER:-smartdoor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartdoor123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartdoor_db}
    volumes:
      - ./:/var/www/html
      - ./config/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
    networks:
      - smartdoor-network
    restart: unless-stopped

  # Service Database (MySQL)
  db:
    image: mysql:8.0
    container_name: smartdoor-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartdoor_db}
      MYSQL_USER: ${MYSQL_USER:-smartdoor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartdoor123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - smartdoor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Service PHPMyAdmin (opsional, untuk mengelola database)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: smartdoor-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-smartdoor}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-smartdoor123}
      PMA_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - smartdoor-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  smartdoor-network:
    driver: bridge
