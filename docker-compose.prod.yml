version: '3.8'

services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: smartdoor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - smartdoor-network
    restart: unless-stopped

  # Service Web (PHP dengan Apache)
  web:
    build: .
    container_name: smartdoor-web
    expose:
      - "80"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER:-smartdoor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartdoor123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartdoor_db}
    volumes:
      - ./:/var/www/html
      - ./config/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./logs/apache:/var/log/apache2
      - ./logs/php:/var/log/php
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartdoor-network
    restart: unless-stopped
    deploy:
      replicas: 2  # Untuk load balancing
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Service Database (MySQL)
  db:
    image: mysql:8.0
    container_name: smartdoor-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartdoor_db}
      MYSQL_USER: ${MYSQL_USER:-smartdoor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartdoor123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
      - ./config/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./logs/mysql:/var/log/mysql
    expose:
      - "3306"
    networks:
      - smartdoor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # Service PHPMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: smartdoor-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-smartdoor}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-smartdoor123}
      PMA_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    expose:
      - "80"
    depends_on:
      - db
    networks:
      - smartdoor-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  smartdoor-network:
    driver: bridge
